# Model card'lar (Doküman 17.1) — model TAK-ÇALIŞTIR burada.
# Bir modeli değiştirmek = burada tek blok. Kod değişmez.
models:
  hypothesis_generator:
    provider: openrouter        # dummy | random | openrouter | vllm | openai_compatible
    # BASELINE KARŞILAŞTIRMASI (Deney A): provider: random + critic: dummy yap,
    # AYNI bütçeyle koş; LLM'in random-search'e karşı verimliliği ölçülür.
    # seed: 0                   # random provider için (reproducibility)
    model: openai/gpt-4o-mini   # ucuz + JSON'da güvenilir. Ücretsiz denemek için:
                                #   meta-llama/llama-3.3-70b-instruct:free
                                #   google/gemini-2.0-flash-exp:free
    api_key_env: OPENROUTER_API_KEY   # key .env'den okunur, koda girmez
    endpoint: null              # vLLM'e geçince: http://localhost:8000/v1
    temperature: 0.9            # üretimde yüksek çeşitlilik
    max_tokens: 4000
    web_search: true            # literatür grounding (Doküman 4.3); kampanya başına 1 web araması

  quant_critic:               # BAĞIMSIZ eleştirmen (Doküman 15)
    provider: openrouter      # dummy | openrouter | vllm
    model: openai/gpt-4o-mini # ideal: üreticiden FARKLI model (gerçek bağımsızlık);
                              #   şimdilik farklı prompt+düşük sıcaklık ile ayrışıyor
    api_key_env: OPENROUTER_API_KEY
    endpoint: null
    temperature: 0.2          # değerlendirmede düşük sıcaklık
