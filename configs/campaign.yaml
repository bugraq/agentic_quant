# Kampanya konfigürasyonu (Doküman 4.1)
# Campaign Manager bu sınırları UYGULAR: izin verilen alanlar/operatörler/ufuklar,
# deney + token bütçesi, risk kısıtları, holdout erişimi. Buradaki her alan kodda
# gerçekten kullanılır (dekoratif değil).
campaign:
  name: us_largecap_daily_alpha_v1
  universe: sp500_point_in_time
  universe_description: "Point-in-time S&P 500: her tarihte GERÇEK endeks üyeleri (~500 isim/gün, pencere boyunca ~700 farklı ticker; bugün endekste olmayanlar dahil), günlük OHLCV bar, Yahoo Finance, 2015-2023"
  goal: "Kesitsel günlük long-short alpha ara"
  start_date: 2015-01-01           # araştırma+holdout kapsayan tam aralık (gerçek veri)
  end_date: 2023-12-31

  # MEMORIZATION ÖNLEMİ: LLM, eğitim verisinden bu dönemde bu hisselere ne
  # olduğunu ezbere bilir (parametre-içi look-ahead). true iken LLM'e ticker
  # adları ve tarih aralığı GİTMEZ; yalnızca anonim evren tarifi gider.
  # false yapmak = memorization ablation deneyi (karşılaştırma için).
  anonymize_universe: true

  # --- İzin verilen strateji uzayı (Campaign Manager kısıtları) ---
  allowed_fields:                  # LLM yalnızca bu veri alanlarını kullanabilir
    # NOT: market_cap YOK — yfinance'ta shares outstanding olmadığından gerçek
    # market_cap üretilemiyor; sahte (fiyat) veriyle "size faktörü" test etmek
    # etiket-sinyal dürüstlüğünü bozar. Gerçek veri gelince eklenebilir.
    - open
    - high
    - low
    - close
    - adjusted_close
    - volume
    - dollar_volume

  allowed_operators:
    # temel
    - return
    - rolling_mean
    - rolling_std
    - cross_sectional_rank
    - negate
    - zscore
    - delta
    - ewma
    - volatility
    - neutralize_sector
    - winsorize
    - normalize
    - demean
    # koşullama / rejim
    - conditional
    - greater_than
    - less_than
    - multiply
    - subtract

  allowed_horizons: [5, 10, 20, 60, 90, 120]     # kullanılabilir pencere/ufuklar
  allowed_rebalance: [daily, weekly, monthly]
  portfolio_types: [cross_sectional_long_short, long_only]

  # --- Bütçe (Campaign Manager) ---
  budget:
    maximum_experiments: 24        # 8 çok azdı; ~570 hisselik evrende anlamlı arama için
    maximum_llm_tokens: 300000     # bu bütçe aşılınca kampanya durur
    cost_bps: 5.0                  # backtest işlem maliyeti (bps)
    parameter_optimization: true   # kabul sonrası pencereleri optimizer arar (LLM değil)

  # --- Risk kısıtları (hard gate; sabit, LLM gameleyemez) ---
  risk_constraints:
    min_acceptance_sharpe: 0.5     # kabul için minimum OOS Sharpe
    max_drawdown: 0.40             # üstü doğrudan red
    max_turnover: 300.0            # yıllık; üstü doğrudan red
    min_positive_folds: 0.5        # walk-forward tutarlılık eşiği

  # --- Holdout politikası (Doküman 10.3) ---
  holdout_policy:
    access_mode: one_shot
    maximum_candidates: 20
    research_fraction: 0.7         # kalan %30 KİLİTLİ holdout
