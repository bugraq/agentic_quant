# Veri kaynağı — TAK-ÇALIŞTIR (sentetik <-> gerçek). Kod değişmez.
# (research/holdout bölme oranı campaign.yaml -> holdout_policy.research_fraction'da.)
data:
  source: sp500_pit          # synthetic | yfinance | sp500_pit

  # POINT-IN-TIME S&P 500 (survivorship DÜZELTMESİ, Doküman 4/7):
  # Wikipedia değişiklik tarihçesinden her tarihteki gerçek üye kümesi kurulur;
  # pencerede bir gün bile üye olmuş HER ticker (bugün endekste olmayanlar
  # dahil, ~700 isim) indirilir ve hisse yalnızca üye olduğu günlerde işlem
  # görür. İlk yükleme uzun sürer (~700 ticker), sonrası cache'ten (data/*.pkl).
  # Tarih aralığı campaign.yaml'dan enjekte edilir (tek kaynak).
  sp500_pit:
    cache_dir: data

  synthetic:
    kind: momentum           # momentum | reversal | random
    n_sec: 20                # varlık sayısı
    n_days: 750              # günlük bar sayısı
    seed: 7                  # tekrar-üretilebilirlik

  # Gerçek veriye geçmek için source: yfinance yap.
  # UYARI: yfinance sabit ticker listesiyle survivorship bias taşır (Doküman 7).
  # Gerçek point-in-time için tarihsel endeks üyeliği + delisting returns gerekir.
  # ~50 likit ABD hissesi (hepsi 2015'ten önce halka açık). Kesitsel long-short
  # için 20 isim çok azdı (dispersiyon düşük); daha geniş evren daha gerçekçi.
  yfinance:
    tickers: [AAPL, MSFT, GOOGL, AMZN, META, NVDA, TSLA, JPM, JNJ, V,
              PG, HD, MA, XOM, BAC, KO, PFE, CSCO, INTC, WMT,
              DIS, NFLX, ADBE, CRM, CMCSA, PEP, ABT, TMO, COST, AVGO,
              TXN, QCOM, ORCL, IBM, MCD, NKE, WFC, GS, MS, C,
              CAT, BA, MMM, HON, UNH, CVX, MRK, LLY, ABBV, AMD]
    # Tarih aralığı campaign.yaml -> start_date/end_date'ten gelir (tek kaynak).

  # İleride: kripto (ccxt) — 7/24, funding rate, ölü coin survivorship'i
  # crypto:
  #   exchange: binance
  #   symbols: [BTC/USDT, ETH/USDT, ...]
  #   timeframe: 1d
